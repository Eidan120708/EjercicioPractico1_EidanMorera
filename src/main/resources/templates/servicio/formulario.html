<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Clase')}"></head>
<body>

<div th:replace="~{layout :: header}"></div>

<section class="contenedor">
    <h2 th:text="${servicio.id == null} ? 'Nueva Clase' : 'Editar Clase'"></h2>
    <div class="linea-acento"></div>

    <div class="form-card">
        <form th:action="@{/servicios/guardar}" th:object="${servicio}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="campo">
                <label for="nombre">Nombre de la Clase</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Clase de CrossFit" required>
            </div>
            <div class="campo">
                <label for="precio">Precio</label>
                <input type="number" id="precio" th:field="*{precio}" step="0.01" placeholder="Ej: 8000.00" required>
            </div>
            <div class="campo">
                <label for="categoria">Categoría</label>
                <select id="categoria" th:field="*{categoria}" required>
                    <option value="">Seleccione una categoría</option>
                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.id}"
                            th:text="${categoria.nombre}"></option>
                </select>
            </div>
            <div class="form-acciones">
                <button type="submit" class="btn">Guardar</button>
                <a class="btn btn-secundario" th:href="@{/servicios}">Cancelar</a>
            </div>
        </form>
    </div>
</section>

<div th:replace="~{layout :: footer}"></div>

</body>
</html>
