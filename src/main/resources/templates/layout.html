<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | PulsoFit'">PulsoFit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<header class="site-header" th:fragment="header">
    <nav class="navbar">
        <a class="brand" th:href="@{/}">PULSO<span>FIT</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Inicio</a></li>
            <li><a th:href="@{/categorias}">Categorías</a></li>
            <li><a th:href="@{/servicios}">Clases</a></li>
            <li><a th:href="@{/reservas}">Reservas</a></li>
            <li><a th:href="@{/contacto}">Contacto</a></li>
        </ul>
    </nav>
</header>

<footer class="site-footer" th:fragment="footer">
    <div class="footer-content">
        <p class="footer-brand">PULSO<span>FIT</span></p>
        <p>Gimnasio y Centro Fitness &mdash; Entrena con propósito.</p>
        <p class="footer-copy">&copy; 2026 PulsoFit. Todos los derechos reservados.</p>
    </div>
</footer>

</body>
</html>
